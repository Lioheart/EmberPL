name: Release Creation

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Populate Versioned keys in Manifest
        run: |
          jq \
            --arg version "${{ github.event.release.tag_name }}" \
            --arg url "https://github.com/${{ github.repository }}" \
            --arg manifest "https://github.com/${{ github.repository }}/releases/latest/download/module.json" \
            --arg download "https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/module.zip" \
            '.version = $version
             | .url = $url
             | .manifest = $manifest
             | .download = $download' \
            module.json > module.tmp.json

          mv module.tmp.json module.json

      - name: Create Module Archive
        run: |
          zip --recurse-paths ./module.zip \
            module.json babele-register.js PIRATESCROLLPL.ttf lang/ styles/

      - name: Update Release with Files
        id: create_version_release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: ${{ github.event.release.name }}
          draft: ${{ github.event.release.draft }}
          prerelease: ${{ github.event.release.prerelease }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: './module.json, ./module.zip'
          tag: ${{ github.event.release.tag_name }}
          body: ${{ github.event.release.body }}
